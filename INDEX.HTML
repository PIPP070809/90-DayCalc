<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>90 Day Calculator</title>

  <!-- Sophisticated Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Playfair Display', serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Sophisticated dark gradient background */
      background: radial-gradient(1200px 600px at 20% 10%, rgba(255,255,255,0.06), transparent 60%),
                  radial-gradient(1000px 500px at 80% 90%, rgba(255,255,255,0.05), transparent 60%),
                  linear-gradient(135deg, #0f0f10, #1a1b1f 40%, #0b0c0e);
      color: #eaeaea;
    }

    .card {
      /* Silver grey card */
      background: linear-gradient(135deg, #dcdde1, #bfc3c9);
      border-radius: 24px;
      padding: 60px;
      width: 420px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.4);
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      margin-bottom: 25px;
      color: #1a1a1a;
      font-weight: 600;
      letter-spacing: 1px;
      font-size: 28px;
      line-height: 1.2;
    }

    .num {
      font-variant-numeric: lining-nums;
      font-feature-settings: "lnum" 1;
      font-size: 1em;
      vertical-align: baseline;
    }

    input {
      width: 100%;
      padding: 20px;
      margin: 20px 0;
      border-radius: 12px;
      border: 1px solid #aaa;
      background: #f5f6f7;
      color: #1a1a1a;
      font-size: 22px; /* larger calendar text */
      font-weight: 500;
      transition: 0.3s;
    }

    input:focus {
      outline: none;
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 0 10px rgba(255,255,255,0.12);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2b2e34, #6c727a);
      color: #ffffff;
      font-size: 18px;
      font-weight: 600; /* slightly bolder */
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    #result {
      margin-top: 25px;
      font-size: 20px; /* bigger result text */
      color: #1a1a1a;
      font-weight: 600;
      min-height: 24px;
      transition: all 0.3s ease;
    }

    .highlight {
      color: #c0392b; /* elegant red */
      font-weight: 700;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  
    .badge {
      position: fixed;
      top: 20px;
      right: 24px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2><span class="num">90</span>-Day Calc</h2>

    <input type="date" id="startDate">

    <button onclick="calculateDate()">Calculate Date</button>

    <div id="result"></div>
  </div>

  <script>
    function calculateDate() {
      const input = document.getElementById("startDate").value;
      const resultBox = document.getElementById("result");

      if (!input) {
        resultBox.innerText = "Please select a date";
        return;
      }

      let startDate = new Date(input);
      startDate.setDate(startDate.getDate() + 90);

      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      const resultDate = startDate.toLocaleDateString(undefined, options);

      resultBox.innerHTML = `Result: <span class="highlight">${resultDate}</span>`;
    }
  </script>

  <div class="badge">PIPP 2026</div>

</body>
</html>
