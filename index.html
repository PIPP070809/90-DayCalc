<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIPP-Calc</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Playfair Display',serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:#f5f7fb;
}


.card{
background:#ffffff;
border-radius:22px;
padding:45px 55px;
width:450px;
max-width:100%;
text-align:center;
box-shadow:0 15px 45px rgba(0,0,0,.12);
border:none;
}


h2{
font-size:40px;
color:#333;
margin-bottom:8px;
}


.subtitle{
font-size:14px;
color:#999;
margin-bottom:25px;
}


.main-option{
padding:16px;
margin:14px 0;
border-radius:18px;
background:#f2f5fb;
color:#555;
cursor:pointer;
transition:.3s;
border:1px solid #e8edf5;
}


.main-option:hover{
background:linear-gradient(135deg,#25c8e8,#249cf5);
color:white;
transform:translateY(-2px);
}


.hidden{
display:none;
}


.desc{
margin:20px 0;
color:#777;
font-size:14px;
}


.options{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}


.opt-btn{
padding:10px 12px;
border-radius:12px;
background:#f3f5fa;
border:1px solid #e5e8ef;
color:#555;
cursor:pointer;
font-size:13px;
transition:.2s;
}


.opt-btn.active{
background:linear-gradient(135deg,#25c8e8,#249cf5);
color:white;
border:none;
}


input{
width:100%;
padding:15px 5px;
margin:18px 0;
border:none;
border-bottom:2px solid #b65cff;
background:transparent;
color:#333;
font-size:15px;
outline:none;
}


button{
width:100%;
padding:15px;
border:none;
border-radius:25px;
cursor:pointer;
background:linear-gradient(135deg,#27d3e9,#2498f5);
color:white;
font-weight:600;
font-size:15px;
}


#result{
margin-top:15px;
color:#555;
}


.highlight{
color:#ff4d4d;
font-weight:600;
}

</style>

</head>


<body>


<div class="card">


<h2 id="title">PIPP-Calc</h2>


<div class="subtitle" id="subtitle">
Automatic BPJS Date Calculator
</div>



<div id="menu">

<div class="main-option" onclick="openAdmin()">
PIPP Administration
</div>


<div class="main-option" onclick="openConverter()">
Converter
</div>


</div>




<div id="admin" class="hidden">


<p class="desc" id="desc">
Silahkan masukkan tanggal Surat Rujukan dikeluarkan:
</p>



<div class="options">


<div class="opt-btn active"
onclick="setMode(90,'days',this,1)">
Masa Aktif Surat Rujukan
</div>


<div class="opt-btn"
onclick="setMode(23,'days',this,2)">
Batas Klaim Kacamata ke Optik
</div>


<div class="opt-btn"
onclick="setMode(2,'years',this,3)">
Klaim 1x 2 Th
</div>


</div>



<input type="date" id="startDate">



<button onclick="calculateDate()">
Calculate Date
</button>



<div id="result"></div>


<br>


<button onclick="backMenu()">
Back
</button>


</div>

</div>




<script>


let modeValue=90;
let modeType="days";



function openAdmin(){

menu.classList.add("hidden");

admin.classList.remove("hidden");

title.innerText="PIPP-Calc";

subtitle.innerText="Automatic BPJS Date Calculator";

}



function openConverter(){

menu.classList.add("hidden");

converter.classList.remove("hidden");

title.innerText="PIPP-Converter";

subtitle.innerText="Image Format Converter";

}



function backMenu(){

menu.classList.remove("hidden");

admin.classList.add("hidden");

converter.classList.add("hidden");

title.innerText="PIPP-Calc";

subtitle.innerText="Automatic BPJS Date Calculator";

}





function setMode(v,t,e,i){

modeValue=v;

modeType=t;


document.querySelectorAll(".opt-btn")
.forEach(x=>x.classList.remove("active"));


e.classList.add("active");



if(i==1)
desc.innerText="Silahkan masukkan tanggal Surat Rujukan dikeluarkan:";


if(i==2)
desc.innerText="Silahkan masukkan tanggal Klaim Kacamata terakhir:";


if(i==3)
desc.innerText="Silahkan masukkan tanggal Klaim Kacamata 2 tahun terakhir:";

}





function calculateDate(){

let input =
document.getElementById("startDate").value;



if(!input){

document.getElementById("result").innerText="Choose date";

return;

}



let d = new Date(input);



if(modeType=="days"){

d.setDate(
d.getDate()+modeValue
);

}

else{

d.setFullYear(
d.getFullYear()+modeValue
);

}



let bulan=[
"Januari",
"Februari",
"Maret",
"April",
"Mei",
"Juni",
"Juli",
"Agustus",
"September",
"Oktober",
"November",
"Desember"
];


let hasil =
`${d.getDate()}/${bulan[d.getMonth()]}/${d.getFullYear()}`;



document.getElementById("result").innerHTML =

`Result: <span class="highlight">
${hasil}
</span>`;

}



</script>

</body>
</html>
