<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIPP-Calc</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Playfair Display',serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(120deg,#0f172a,#1e293b,#0f172a);
}


.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(25px);
border-radius:28px;
padding:45px;
width:450px;
max-width:100%;
text-align:center;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 10px 40px rgba(0,0,0,.5);
}


h2{
font-size:40px;
color:#f5f5f7;
}


.subtitle{
font-size:14px;
color:rgba(255,255,255,.6);
margin-bottom:20px;
}


.main-option{

padding:15px;
margin:12px 0;
border-radius:14px;
background:rgba(255,255,255,.12);
color:white;
cursor:pointer;
transition:.3s;

}


.main-option:hover{

background:linear-gradient(135deg,#ffe600,#ffd000);
color:#111;

}


.hidden{
display:none;
}


.desc{

margin:20px 0;
color:white;
}


.options{

display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;

}


.opt-btn{

padding:10px;
border-radius:10px;
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.2);
color:white;
cursor:pointer;
font-size:13px;

}


.opt-btn.active{

background:#ffe600;
color:#111;

}


input{

width:100%;
padding:15px;
margin:15px 0;
border-radius:14px;
border:none;

background:rgba(255,255,255,.12);
color:white;

}


button{

width:100%;
padding:15px;
border:none;
border-radius:14px;
cursor:pointer;

background:linear-gradient(135deg,#ffe600,#ffd000);
font-weight:600;

}


#result{

margin-top:20px;
color:white;

}


.highlight{

color:#ff453a;

}

</style>

</head>


<body>


<div class="card">


<h2 id="title">PIPP-Calc</h2>

<div class="subtitle" id="subtitle">
Automatic BPJS Date Calculator
</div>



<!-- MAIN MENU -->

<div id="menu">


<div class="main-option" onclick="openAdmin()">
PIPP Administration
</div>


<div class="main-option" onclick="openConverter()">
Converter
</div>


</div>





<!-- ADMIN -->

<div id="admin" class="hidden">


<p class="desc" id="desc">
Silahkan masukkan tanggal Surat Rujukan dikeluarkan:
</p>


<div class="options">


<div class="opt-btn active"
onclick="setMode(90,'days',this,1)">
Masa Aktif Surat Rujukan
</div>


<div class="opt-btn"
onclick="setMode(23,'days',this,2)">
Batas Klaim Kacamata ke Optik
</div>


<div class="opt-btn"
onclick="setMode(2,'years',this,3)">
Klaim 1x 2 Th
</div>


</div>



<input type="date" id="startDate">


<button onclick="calculateDate()">
Calculate Date
</button>


<div id="result"></div>


<br>

<button onclick="backMenu()">
Back
</button>


</div>






<!-- CONVERTER -->


<div id="converter" class="hidden">


<p class="desc" id="converterDesc">
Silahkan masukkan gambar yang ingin anda ubah menjadi JPG &lt; 1 Mb
</p>



<input 
type="file"
id="imageInput"
accept="image/*">



<button onclick="convertImage()">
Convert JPG
</button>


<div id="convertResult"></div>


<br>


<button onclick="backMenu()">
Back
</button>


</div>



</div>





<script>


let modeValue=90;
let modeType="days";



function openAdmin(){

menu.classList.add("hidden");

admin.classList.remove("hidden");


document.getElementById("title").innerText =
"PIPP-Calc";


document.getElementById("subtitle").innerText =
"Automatic BPJS Date Calculator";


}




function openConverter(){

menu.classList.add("hidden");

converter.classList.remove("hidden");


document.getElementById("title").innerText =
"PIPP-Converter";


document.getElementById("subtitle").innerText =
"Image Format Converter";

}




function backMenu(){

menu.classList.remove("hidden");


admin.classList.add("hidden");


converter.classList.add("hidden");



document.getElementById("title").innerText =
"PIPP-Calc";


document.getElementById("subtitle").innerText =
"Automatic BPJS Date Calculator";

}






function setMode(value,type,el,index){

modeValue=value;

modeType=type;



document.querySelectorAll('.opt-btn')
.forEach(btn=>btn.classList.remove('active'));



el.classList.add('active');



if(index==1)

desc.innerText =
"Silahkan masukkan tanggal Surat Rujukan dikeluarkan:";



if(index==2)

desc.innerText =
"Silahkan masukkan tanggal Klaim Kacamata terakhir:";



if(index==3)

desc.innerText =
"Silahkan masukkan tanggal Klaim Kacamata 2 tahun terakhir:";


}






function calculateDate(){


let input=startDate.value;



if(!input){

result.innerText="Please select a date";

return;

}



let date=new Date(input);




if(modeType=="days")

date.setDate(date.getDate()+modeValue);



else

date.setFullYear(date.getFullYear()+modeValue);




result.innerHTML=

`Result: <span class="highlight">

${date.toLocaleDateString()}

</span>`;

}








// IMAGE CONVERTER


function convertImage(){


let file =
document.getElementById("imageInput").files[0];



if(!file){

convertResult.innerText =
"Choose image first";

return;

}




let img=new Image();

let reader=new FileReader();



reader.onload=function(e){

img.src=e.target.result;

}




img.onload=function(){


let canvas=document.createElement("canvas");


let ctx=canvas.getContext("2d");



canvas.width=img.width;

canvas.height=img.height;



ctx.drawImage(img,0,0);



let quality=.9;



function compress(){


canvas.toBlob(function(blob){



if(blob.size>1024*1024 && quality>.1){


quality-=.1;

compress();


}


else{


let a=document.createElement("a");


a.href=
URL.createObjectURL(blob);



a.download="converted.jpg";


a.click();



convertResult.innerHTML =
"Done ✔ JPG under 1MB";

}


},"image/jpeg",quality);



}



compress();


}



reader.readAsDataURL(file);


}


</script>


</body>
</html>
