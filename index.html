<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIPP-Calc</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Playfair Display', serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(120deg, #0f172a, #1e293b, #0f172a);
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(25px);
      border-radius: 28px;
      padding: 50px;
      width: 420px;
      max-width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    /* 🔥 TITLE */
    h2 {
      font-size: 40px;
      font-weight: 700;
      color: #f5f5f7;
      letter-spacing: 1px;
    }

    /* ✨ SUBTITLE */
    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    .desc {
      margin-bottom: 20px;
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
      min-height: 48px;
    }

    .options {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .opt-btn {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: 0.3s;
    }

    .opt-btn.active {
      background: linear-gradient(135deg, #ffe600, #ffd000);
      color: #1a1a1a;
      font-weight: 600;
      box-shadow: 0 3px 12px rgba(255,220,0,0.3);
    }

    input {
      width: 100%;
      padding: 16px;
      margin: 16px 0;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #ffe600, #ffd000);
      color: #1a1a1a;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 3px 15px rgba(255,220,0,0.35);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 25px rgba(255,230,0,0.5);
    }

    #result {
      margin-top: 20px;
      font-size: 17px;
      color: #f5f5f7;
    }

    .highlight {
      color: #ff453a;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }

      h2 {
        font-size: 32px;
      }
    }

  </style>
</head>
<body>

  <div class="card">
    <h2>PIPP-Calc</h2>
    <div class="subtitle">Automatic BPJS Date Calculator</div>

    <p class="desc" id="desc">
      Silahkan masukkan tanggal Surat Rujukan dikeluarkan:
    </p>

    <div class="options">
      <div class="opt-btn active" onclick="setMode(90, 'days', this, 1)">
        Masa Aktif Surat Rujukan
      </div>
      <div class="opt-btn" onclick="setMode(23, 'days', this, 2)">
        Batas klaim kacamata ke Optik
      </div>
      <div class="opt-btn" onclick="setMode(2, 'years', this, 3)">
        Klaim 1x 2 Thn
      </div>
    </div>

    <input type="date" id="startDate">

    <button onclick="calculateDate()">Calculate Date</button>

    <div id="result"></div>
  </div>

  <script>
    let modeValue = 90;
    let modeType = "days";

    function setMode(value, type, el, modeIndex) {
      modeValue = value;
      modeType = type;

      document.querySelectorAll('.opt-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      el.classList.add('active');

      const desc = document.getElementById("desc");

      if (modeIndex === 1) {
        desc.innerText = "Silahkan masukkan tanggal Surat Rujukan dikeluarkan:";
      } else if (modeIndex === 2) {
        desc.innerText = "Silahkan masukkan tanggal Klaim Kacamata Bantuan BPJS terakhir:";
      } else if (modeIndex === 3) {
        desc.innerText = "Silahkan masukkan tanggal Klaim Kacamata Bantuan 1x 2 Tahun terakhir:";
      }
    }

    function calculateDate() {
      const input = document.getElementById("startDate").value;
      const resultBox = document.getElementById("result");

      if (!input) {
        resultBox.innerText = "Please select a date";
        return;
      }

      let startDate = new Date(input);

      if (modeType === "days") {
        startDate.setDate(startDate.getDate() + modeValue);
      } else {
        startDate.setFullYear(startDate.getFullYear() + modeValue);
      }

      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      const resultDate = startDate.toLocaleDateString(undefined, options);

      resultBox.innerHTML = `Result: <span class="highlight">${resultDate}</span>`;
    }
  </script>

</body>
</html>
