<script>


let modeValue=90;
let modeType="days";



function openAdmin(){

menu.classList.add("hidden");

admin.classList.remove("hidden");


title.innerText="PIPP-Calc";

subtitle.innerText=
"Automatic BPJS Date Calculator";

}



function openConverter(){

menu.classList.add("hidden");

converter.classList.remove("hidden");


title.innerText="PIPP-Converter";

subtitle.innerText=
"Image Format Converter";

}



function backMenu(){

menu.classList.remove("hidden");

admin.classList.add("hidden");

converter.classList.add("hidden");


title.innerText="PIPP-Calc";

subtitle.innerText=
"Automatic BPJS Date Calculator";

}






function setMode(v,t,e,i){

modeValue=v;

modeType=t;


document.querySelectorAll(".opt-btn")
.forEach(x=>x.classList.remove("active"));


e.classList.add("active");



if(i==1)
desc.innerText="Silahkan masukkan tanggal Surat Rujukan dikeluarkan:";


if(i==2)
desc.innerText="Silahkan masukkan tanggal Klaim Kacamata terakhir:";


if(i==3)
desc.innerText="Silahkan masukkan tanggal Klaim Kacamata 2 tahun terakhir:";

}





// UPDATED DATE CALCULATOR

function calculateDate(){

let input =
document.getElementById("startDate").value;



if(!input){

document.getElementById("result").innerText =
"Choose date";

return;

}



let d = new Date(input);



if(modeType=="days"){

d.setDate(
d.getDate()+modeValue
);

}

else{

d.setFullYear(
d.getFullYear()+modeValue
);

}



let months=[
"Januari",
"Februari",
"Maret",
"April",
"Mei",
"Juni",
"Juli",
"Agustus",
"September",
"Oktober",
"November",
"Desember"
];



let formattedDate =
d.getDate()
+" "
+months[d.getMonth()]
+" "
+d.getFullYear();




document.getElementById("result").innerHTML =

`Result: <span class="highlight">
${formattedDate}
</span>`;

}






function hideBoxes(){

sklBox.classList.add("hidden");

jpgpdfBox.classList.add("hidden");

pdfjpgBox.classList.add("hidden");

}



function openSKL(){

hideBoxes();

sklBox.classList.remove("hidden");

}



function openJPGPDF(){

hideBoxes();

jpgpdfBox.classList.remove("hidden");

}



function openPDFJPG(){

hideBoxes();

pdfjpgBox.classList.remove("hidden");

}






function convertSKL(){

let file=sklInput.files[0];

if(!file)return;


let img=new Image();

let reader=new FileReader();


reader.onload=e=>img.src=e.target.result;


img.onload=function(){

let canvas=document.createElement("canvas");

canvas.width=img.width;

canvas.height=img.height;


canvas.getContext("2d")
.drawImage(img,0,0);


let quality=.9;



function compress(){

canvas.toBlob(blob=>{


if(blob.size>900000 && quality>.1){

quality-=.05;

compress();

}

else{


let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="SKL_BBL.jpg";

a.click();


sklResult.innerText=
"Done ✔ JPG under 900KB";

}

},"image/jpeg",quality);


}


compress();

}


reader.readAsDataURL(file);

}





function convertJPGPDF(){


let file=jpgPdfInput.files[0];

let reader=new FileReader();


reader.onload=function(e){


let pdf =
new jspdf.jsPDF();


pdf.addImage(
e.target.result,
"JPEG",
10,
10,
190,
140
);


pdf.save("converted.pdf");


jpgPdfResult.innerText=
"Done ✔ PDF created";

}


reader.readAsDataURL(file);

}






function convertPDFJPG(){


let file=pdfInput.files[0];

let reader=new FileReader();



reader.onload=function(){


pdfjsLib.getDocument(reader.result)
.promise.then(pdf=>{


pdf.getPage(1)
.then(page=>{


let viewport =
page.getViewport({scale:2});


let canvas =
document.createElement("canvas");


canvas.width=viewport.width;

canvas.height=viewport.height;


page.render({

canvasContext:
canvas.getContext("2d"),

viewport:viewport

})
.promise.then(()=>{


let a=document.createElement("a");


a.href=
canvas.toDataURL("image/jpeg");


a.download="converted.jpg";


a.click();


pdfJpgResult.innerText=
"Done ✔ JPG created";


});


});


});


}


reader.readAsArrayBuffer(file);

}


</script>
