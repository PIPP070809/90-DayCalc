<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIPP-Calc</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

/* CSS KAMU TETAP SAMA */

</style>

</head>

<body>

<div class="card">

<h2 id="title">PIPP-Calc</h2>

<div class="subtitle" id="subtitle">
Automatic BPJS Date Calculator
</div>

<div id="menu">

<div class="main-option" onclick="openAdmin()">
PIPP Administration
</div>

<div class="main-option" onclick="openConverter()">
Converter
</div>

</div>


<div id="admin" class="hidden">

<p class="desc" id="desc">
Silahkan masukkan tanggal Surat Rujukan dikeluarkan:
</p>


<div class="options">

<div class="opt-btn active"
onclick="setMode(90,'days',this,1)">
Masa Aktif Surat Rujukan
</div>

<div class="opt-btn"
onclick="setMode(23,'days',this,2)">
Batas Klaim Kacamata ke Optik
</div>

<div class="opt-btn"
onclick="setMode(2,'years',this,3)">
Klaim 1x 2 Th
</div>

</div>


<input type="date" id="startDate">


<button onclick="calculateDate()">
Calculate Date
</button>


<div id="result"></div>


<br>

<button onclick="backMenu()">
Back
</button>


</div>


</div>


<script>


let modeValue=90;
let modeType="days";



function openAdmin(){

menu.classList.add("hidden");

admin.classList.remove("hidden");

title.innerText="PIPP-Calc";

subtitle.innerText=
"Automatic BPJS Date Calculator";

}



function openConverter(){

menu.classList.add("hidden");

converter.classList.remove("hidden");

title.innerText="PIPP-Converter";

subtitle.innerText=
"Image Format Converter";

}



function backMenu(){

menu.classList.remove("hidden");

admin.classList.add("hidden");

converter.classList.add("hidden");

title.innerText="PIPP-Calc";

subtitle.innerText=
"Automatic BPJS Date Calculator";

}



function setMode(v,t,e,i){

modeValue=v;

modeType=t;


document.querySelectorAll(".opt-btn")
.forEach(x=>x.classList.remove("active"));


e.classList.add("active");


if(i==1)
desc.innerText="Silahkan masukkan tanggal Surat Rujukan dikeluarkan:";


if(i==2)
desc.innerText="Silahkan masukkan tanggal Klaim Kacamata terakhir:";


if(i==3)
desc.innerText="Silahkan masukkan tanggal Klaim Kacamata 2 tahun terakhir:";

}




function calculateDate(){

let input =
document.getElementById("startDate").value;



if(!input){

document.getElementById("result").innerText =
"Choose date";

return;

}



let d = new Date(input);



if(modeType=="days"){

d.setDate(
d.getDate()+modeValue
);

}

else{

d.setFullYear(
d.getFullYear()+modeValue
);

}



let bulan = [
"Januari",
"Februari",
"Maret",
"April",
"Mei",
"Juni",
"Juli",
"Agustus",
"September",
"Oktober",
"November",
"Desember"
];


let hasil =
`${d.getDate()}/${bulan[d.getMonth()]}/${d.getFullYear()}`;



document.getElementById("result").innerHTML =

`Result: <span class="highlight">
${hasil}
</span>`;

}



</script>

</body>
</html>
